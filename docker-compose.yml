services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: xeno_ai_crm
      POSTGRES_USER: xeno
      POSTGRES_PASSWORD: xeno_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xeno -d xeno_ai_crm"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./crm-backend
    volumes:
      - ./crm-backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://xeno:xeno_password@postgres:5432/xeno_ai_crm
      REDIS_URL: redis://redis:6379/0
      CHANNEL_STUB_CALLBACK_URL: http://channel-stub:9000
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  channel-stub:
    build:
      context: ./channel-stub
    environment:
      REDIS_URL: redis://redis:6379/0
      CRM_WEBHOOK_URL: http://backend:8000/api/campaigns/receipt
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A celery_app.celery_app worker --loglevel=info

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./xeno-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
